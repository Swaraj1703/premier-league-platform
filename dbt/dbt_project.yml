name: 'pl_platform'
version: '1.0.0'
config-version: 2

require-dbt-version: [">=1.10.0", "<2.0.0"]

profile: 'pl_platform'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  pl_platform:
    staging:
      +materialized: view
      +schema: prep_football
    marts:
      +materialized: table
      +schema: prod_football
